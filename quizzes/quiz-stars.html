<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Квиз: Звёзды и галактики</title>
  <link rel="stylesheet" href="../css/style.css">
</head>
<body>
  <header>
    <h1>Квиз: Звёзды и галактики</h1>
    <a href="../index.html" class="back-link">← Назад</a>
  </header>
  <main id="quiz-container">
    <section id="quiz-intro" class="quiz-section">
      <h2>Звёзды и галактики</h2>
      <p>Узнайте больше о звёздах и галактиках. Проверьте свои знания о самых массивных звёздах, магнетарах и ближайших к нам светилах.</p>
      <button id="start-quiz" class="cta-button">Начать квиз</button>
    </section>
    <section id="quiz-progress" class="quiz-section hidden">
      <div class="progress-bar-container">
        <div class="progress-bar" id="progress-bar"></div>
        <span id="progress-text">Вопрос 1 из 3</span>
      </div>
      <form id="quiz-form">
        <!-- Вопросы будут вставлены сюда скриптом -->
      </form>
      <button type="button" id="submit-answer" class="cta-button">Ответить</button>
    </section>
    <section id="quiz-result" class="quiz-section hidden">
      <h2>Ваш результат: <span id="result-score">0</span> из <span id="result-total">3</span></h2>
      <ul id="result-list"></ul>
      <button id="restart-quiz" class="cta-button">Пройти снова</button>
    </section>
  </main>
  <script src="../js/script.js"></script>
</body>
</html>
